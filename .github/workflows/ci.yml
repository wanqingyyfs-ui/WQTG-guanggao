name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Enforce ASCII-safe Windows installer
        shell: powershell
        run: |
          $bytes = [System.IO.File]::ReadAllBytes("scripts/install.ps1")
          if ($bytes | Where-Object { $_ -gt 127 }) {
            throw "scripts/install.ps1 must remain ASCII-safe for Windows PowerShell 5.1."
          }
      - name: Validate installer with Windows PowerShell 5.1
        shell: powershell
        run: .\scripts\install.ps1 -PythonCommand python -ValidateOnly
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -r requirements.txt pytest
      - run: python -m playwright install chromium
      - run: python -m compileall -q app main.py
      - run: pytest
